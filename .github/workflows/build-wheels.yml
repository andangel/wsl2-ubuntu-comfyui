name: Build Precompiled Wheels

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-wheels:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        package:
          - sageattention
          - flashattention
          - sam2
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git wget

    - name: Install CUDA Toolkit
      run: |
        # Increase timeout and use --no-install-recommends to speed up installation
        wget --timeout=30 https://developer.download.nvidia.com/compute/cuda/repos/wsl-ubuntu/x86_64/cuda-keyring_1.1-1_all.deb
        sudo dpkg -i cuda-keyring_1.1-1_all.deb
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends cuda-toolkit-12-8
        echo "/usr/local/cuda-12.8/bin" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=/usr/local/cuda-12.8/lib64:$LD_LIBRARY_PATH" >> $GITHUB_ENV

    - name: Install PyTorch
      run: |
        pip install --upgrade pip
        pip install torch==2.8.0 torchvision==0.23.0 torchaudio==2.8.0 --index-url https://download.pytorch.org/whl/cu128
        pip install ninja packaging

    - name: Build ${{ matrix.package }}
      run: |
        bash scripts/build_${{ matrix.package }}.sh

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.package }}-wheels
        path: dist/*.whl
        retention-days: 90
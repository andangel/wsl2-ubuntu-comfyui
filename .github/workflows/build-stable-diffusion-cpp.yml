name: Build Stable-Diffusion.cpp (CUDA)

on:
  workflow_dispatch:

jobs:
  build-stable-diffusion-cpp:
    runs-on: ubuntu-24.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          git \
          wget \
          cmake \
          ninja-build

    - name: Install CUDA Toolkit
      run: |
        wget https://developer.download.nvidia.com/compute/cuda/repos/wsl-ubuntu/x86_64/cuda-keyring_1.1-1_all.deb
        sudo dpkg -i cuda-keyring_1.1-1_all.deb
        sudo apt-get update
        sudo apt-get install -y cuda-toolkit-12-8
        
        # Set up CUDA environment
        echo "/usr/local/cuda-12.8/bin" >> $GITHUB_PATH
        echo "CUDA_HOME=/usr/local/cuda-12.8" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=/usr/local/cuda-12.8/lib64:$LD_LIBRARY_PATH" >> $GITHUB_ENV

    - name: Check CUDA installation
      run: |
        echo "=== 检查 CUDA 安装 ==="
        nvcc --version || echo "nvcc not found"
        ls /usr/local/ | grep cuda || echo "No cuda in /usr/local"
        ls /usr/local/cuda-12.8/targets/x86_64-linux/include || echo "CUDA include not found"
        ls /usr/local/cuda-12.8/lib64 || echo "CUDA lib64 not found"
        echo "CUDA_HOME=$CUDA_HOME"
        echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"

    - name: Clone stable-diffusion.cpp
      run: |
        git clone https://github.com/leejet/stable-diffusion.cpp.git
        cd stable-diffusion.cpp
        git submodule update --init --recursive

    - name: Build with CUDA
      run: |
        cd stable-diffusion.cpp
        
        # Ensure build directory exists
        mkdir -p build
        cd build
        
        echo "=== 配置 CMake (CUDA 版本) ==="
        if ! cmake .. \
          -DSD_CUDA=ON \
          -DSD_BUILD_SHARED_LIBS=ON \
          -DCMAKE_CUDA_ARCHITECTURES='89' \
          -DCMAKE_CUDA_FLAGS='-Xcudafe "--diag_suppress=177" -Xcudafe "--diag_suppress=550"' \
          -DCMAKE_BUILD_TYPE=Release \
          -G Ninja; then
            echo "=== CMake 配置失败 ==="
            echo "=== CMakeCache.txt 最后 50 行 ==="
            tail -50 CMakeCache.txt
            echo "=== CMakeFiles/CMakeError.log ==="
            cat CMakeFiles/CMakeError.log 2>/dev/null || echo "Not found"
            exit 1
        fi
        
        echo "=== 开始编译 ==="
        if ! cmake --build . --config Release; then
            echo "=== 编译失败 ==="
            echo "=== 构建目录内容 ==="
            ls -la
            echo "=== bin 目录内容 ==="
            ls -la bin/ 2>/dev/null || echo "bin directory not found"
            exit 1
        fi
        
        echo "=== 编译成功 ==="
        ls -la bin/

    - name: Check build output
      run: |
        cd stable-diffusion.cpp
        echo "=== 构建目录内容 ==="
        ls -la
        echo "=== build 目录内容 ==="
        ls -la build/ || echo "Build directory not found"
        echo "=== build/bin 目录内容 ==="
        ls -la build/bin/ || echo "Build/bin directory not found"
        if [ ! -f "build/bin/sd" ]; then
            echo "=== 构建失败，检查 CMake 输出 ==="
            cat build/CMakeCache.txt || echo "CMakeCache.txt not found"
            cat build/CMakeError.log || echo "CMakeError.log not found"
            cat build/CMakeOutput.log || echo "CMakeOutput.log not found"
            exit 1
        fi

    - name: Test build
      run: |
        cd stable-diffusion.cpp/build/bin
        ./sd --help | head -20

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: stable-diffusion-cpp
        path: stable-diffusion.cpp/build/bin/sd
        retention-days: 90

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: stable-diffusion-cpp
        name: Stable-Diffusion.cpp (CUDA)
        body: |
          Precompiled Stable-Diffusion.cpp with CUDA support for Ubuntu 24.04 (WSL2)
          
          Features:
          - CUDA acceleration for NVIDIA GPUs (Ada Lovelace, RTX 40 series)
          - Built with CUDA 12.8
          - Support for multiple models (SD1.x, SD2.x, SDXL, SD3, FLUX, etc.)
          - Latest version with FLUX.2-klein support
          
          Usage:
          ```bash
          # Basic usage
          ./sd -m path/to/model.safetensors -p "a beautiful cat"
          
          # With CUDA
          ./sd -m path/to/model.safetensors -p "a beautiful cat" --device cuda
          
          # With FLUX model
          ./sd -m path/to/flux.safetensors -p "a beautiful cat" --device cuda
          ```
        files: |
          stable-diffusion.cpp/build/bin/sd
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
